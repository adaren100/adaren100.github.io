baseURL = 'https://adaren100.github.io/'
languageCode = 'en-us'
title = "Ada's Notes"
theme = 'PaperMod'
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  author = 'Ada'
  description = 'Personal notes, posts, and experiments.'
  keywords = ['ada', 'notes', 'blog', 'hugo']
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  mainSections = ['posts', 'ai-digest', 'big-tech-research']

  [params.homeInfoParams]
    Title = 'Notes on learning and building'
    Content = "Daily notes from the AI frontier — in English and Chinese."

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10

  [[menu.main]]
    identifier = 'ai-digest'
    name = 'AI Digest（今日动态）'
    url = '/ai-digest/'
    weight = 15

  [[menu.main]]
    identifier = 'big-tech-research'
    name = 'Big Tech Research'
    url = '/big-tech-research/'
    weight = 17

  [[menu.main]]
    identifier = 'archives'
    name = 'Archive'
    url = '/archives/'
    weight = 20

[caches]
  [caches.images]
    dir = ':cacheDir/images'
