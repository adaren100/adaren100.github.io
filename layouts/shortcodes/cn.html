{{- /* cn shortcode — wraps a Chinese translation block.
       AI Digest: tinted accent-light bg + left accent border.
       Big-tech-research: thin grey left border, no bg.
       Other sections: falls back to AI Digest style.
*/ -}}
{{- $section := .Page.Section -}}

</div>
